<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Photo Gallery - Bidar Chess Association</title>
  <meta name="description" content="Browse photos from chess tournaments, coaching sessions, events, and award ceremonies organized by Bidar Chess Association." />
  <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />

  <!-- Google Fonts: Sora -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sora: ['Sora', 'sans-serif'],
          },
          colors: {
            dark: '#212326',
            light: '#E2D8DA',
            accent: '#af7d51',
            bodyBg: '#E9EAEF',
            gray1: '#434549',
            footerBg: '#1a1c1f',
          },
        },
      },
    };
  </script>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
  <style>
    .inner-header {
      background: linear-gradient(rgba(33, 35, 38, 0.8), rgba(33, 35, 38, 0.8)), url('images/hero/slide3.jpg') no-repeat center center/cover;
      padding-top: 180px;
      padding-bottom: 80px;
      text-align: center;
      color: #fff;
    }

    /* Zoom & Overlay Hover Effect for Gallery Cards */
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      aspect-ratio: 4 / 3;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .gallery-item:hover img {
      transform: scale(1.05);
    }
    
    /* Overlay */
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(33, 35, 38, 0.7) 0%, rgba(33, 35, 38, 0) 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: flex-end;
      padding: 20px;
      z-index: 10;
    }
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }

    /* Lightbox Modal */
    .lightbox {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-in-out;
    }
    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body class="font-sora">

  <!-- =====================================================
       HEADER
       ===================================================== -->
    <header class="nav-header" id="mainHeader">
    <nav class="py-5 px-6 lg:px-8" id="mainNav">
      <div class="max-w-7xl mx-auto flex items-center justify-between w-full">
        
        <!-- Left Side: Social Icons & Left Menu -->
        <div class="flex items-center gap-8">
          <div class="hidden lg:flex items-center gap-4" id="headerSocial"></div>
          <ul class="hidden lg:flex items-center gap-8 desktop-nav" id="navLeft"></ul>
        </div>

        <!-- Logo (center) -->
        <a href="index.html" class="flex-shrink-0 mx-8" id="navLogo">
          <img src="images/logo.png" alt="Bidar Chess Association" class="w-[120px] h-[120px] object-contain" />
        </a>

        <!-- Right Side: Right Menu & Hamburger -->
        <div class="flex items-center gap-8">
          <ul class="hidden lg:flex items-center gap-8 desktop-nav" id="navRight"></ul>
          <!-- Mobile hamburger -->
          <button class="lg:hidden text-white text-2xl" onclick="toggleMobileMenu()" aria-label="Toggle Menu">
            <i class="fas fa-bars"></i>
          </button>
        </div>

      </div>
    </nav>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu"></div>

  <!-- =====================================================
       INNER HEADER
       ===================================================== -->
  <div class="inner-header">
    <div class="max-w-7xl mx-auto px-6 animate-fadeInUp">
      <h1 class="text-4xl md:text-5xl font-bold mb-4">Gallery</h1>
      <p class="text-lg text-gray-300">Capturing the memorable moments of our tournaments and training events</p>
    </div>
  </div>

  <!-- =====================================================
       GALLERY GRID SECTION
       ===================================================== -->
  <section class="py-16 md:py-24 bg-white" id="galleryGridSection">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
      
      <!-- 3-Column Responsive Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="galleryGrid">
        <!-- Injected images dynamically in exact alphabetical/numerical order -->
      </div>

    </div>
  </section>

  <!-- =====================================================
       LIGHTBOX PREVIEW MODAL
       ===================================================== -->
  <div class="lightbox fixed inset-0 z-[1100] bg-black bg-opacity-95 flex items-center justify-center p-4" id="lightboxModal" role="dialog" aria-modal="true" aria-label="Image Preview">
    <!-- Close Button -->
    <button class="absolute top-6 right-6 text-white text-3xl opacity-80 hover:opacity-100 transition-opacity z-[1200]" onclick="closeLightbox()" aria-label="Close Preview">
      <i class="fas fa-times"></i>
    </button>

    <!-- Prev Button -->
    <button class="absolute left-6 text-white text-4xl opacity-80 hover:opacity-100 transition-opacity z-[1200] hidden md:block" onclick="prevImage()" aria-label="Previous Image">
      <i class="fas fa-chevron-left"></i>
    </button>

    <!-- Image Container -->
    <div class="relative max-w-4xl max-h-[80vh] flex flex-col items-center">
      <img src="" alt="Enlarged View" class="max-w-full max-h-[75vh] object-contain rounded shadow-2xl border border-gray-800" id="lightboxImage" />
      <span class="text-gray-400 mt-4 text-sm font-semibold tracking-wider" id="lightboxCounter">1 / 8</span>
    </div>

    <!-- Next Button -->
    <button class="absolute right-6 text-white text-4xl opacity-80 hover:opacity-100 transition-opacity z-[1200] hidden md:block" onclick="nextImage()" aria-label="Next Image">
      <i class="fas fa-chevron-right"></i>
    </button>

    <!-- Mobile Navigation Bar -->
    <div class="absolute bottom-6 left-0 right-0 flex justify-center gap-12 md:hidden">
      <button class="text-white text-3xl opacity-80 hover:opacity-100" onclick="prevImage()" aria-label="Previous Image">
        <i class="fas fa-chevron-left"></i>
      </button>
      <button class="text-white text-3xl opacity-80 hover:opacity-100" onclick="nextImage()" aria-label="Next Image">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </div>

  <!-- =====================================================
       FOOTER
       ===================================================== -->
  <footer class="bg-dark text-white pt-16 pb-8" id="siteFooter">
    <div class="max-w-7xl mx-auto px-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-12">
        <div id="footerCol1"></div>
        <div id="footerCol2"></div>
        <div id="footerCol3"></div>
      </div>
      <div class="border-t border-gray-700 pt-6 text-center text-sm text-gray-400" id="copyrightBar"></div>
    </div>
  </footer>

  <!-- Floating elements -->
  <a class="whatsapp-btn" id="whatsappBtn" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16.004 0h-.008C7.174 0 0 7.176 0 16.004c0 3.502 1.14 6.742 3.072 9.376L1.062 31.13l5.97-1.972A15.93 15.93 0 0016.004 32C24.826 32 32 24.824 32 16.004 32 7.176 24.826 0 16.004 0zm9.32 22.616c-.392 1.098-1.936 2.01-3.156 2.276-.836.178-1.928.32-5.606-1.204-4.704-1.95-7.73-6.726-7.966-7.038-.226-.312-1.9-2.534-1.9-4.832 0-2.298 1.2-3.43 1.628-3.898.392-.428 1.018-.606 1.614-.606.196 0 .372.01.53.018.468.02.702.048 1.012.784.388.922 1.332 3.252 1.448 3.49.118.24.236.556.078.868-.148.32-.278.52-.518.798-.24.278-.494.62-.706.832-.24.24-.49.502-.21.984.278.482 1.238 2.042 2.66 3.31 1.826 1.63 3.364 2.136 3.842 2.374.478.238.758.198 1.036-.118.278-.318 1.198-1.396 1.516-1.874.318-.478.636-.398 1.074-.238.44.158 2.784 1.314 3.262 1.552.478.24.796.356.914.556.116.198.116 1.156-.276 2.266z"/></svg>
  </a>
  <button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
    <i class="fas fa-chevron-up"></i>
  </button>

  <!-- =====================================================
       JAVASCRIPT
       ===================================================== -->
  <script src="content.js"></script>
  <script>
    const arrow = () => '<span class="ml-2 inline-block transition-transform group-hover:translate-x-1">→</span>';

    // Highlight current page in nav
    const currentPath = window.location.pathname.split('/').pop() || 'gallery.html';

    // ── Build Header Social ───────────────────────
    (function buildHeaderSocial() {
      const el = document.getElementById('headerSocial');
      const icons = [
        { icon: 'fa-brands fa-facebook-f', href: CONTENT.social.facebook, label: 'Facebook' },
        { icon: 'fa-brands fa-x-twitter', href: CONTENT.social.twitter, label: 'X' },
        { icon: 'fa-brands fa-instagram', href: CONTENT.social.instagram, label: 'Instagram' },
      ];
      el.innerHTML = icons.map(i =>
        `<a href="${i.href}" target="_blank" rel="noopener noreferrer" class="text-white text-sm hover:text-gray-300 transition-colors" aria-label="${i.label}"><i class="${i.icon}"></i></a>`
      ).join('');
    })();

    // ── Build Nav Bar ──────────────────────────────
    (function buildNav() {
      const left = document.getElementById('navLeft');
      const right = document.getElementById('navRight');

      const isItemActive = (item) => {
        if (item.href === 'gallery.html') return true; // force active
        return item.href === currentPath;
      };

      left.innerHTML = CONTENT.nav.left.map(item => {
        const isActive = isItemActive(item);
        if (item.submenu) {
          return `<li class="nav-item relative">
            <a href="${item.href}" class="nav-link ${isActive ? 'active' : ''}">${item.label} <i class="fas fa-chevron-down text-[10px] ml-1"></i></a>
            <div class="nav-dropdown">
              ${item.submenu.map(s => `<a href="${s.href}">${s.label}</a>`).join('')}
            </div>
          </li>`;
        }
        return `<li class="nav-item"><a href="${item.href}" class="nav-link ${isActive ? 'active' : ''}">${item.label}</a></li>`;
      }).join('');

      right.innerHTML = CONTENT.nav.right.map(item => {
        const isActive = isItemActive(item);
        return `<li class="nav-item"><a href="${item.href}" class="nav-link ${isActive ? 'active' : ''}">${item.label}</a></li>`;
      }).join('');

      const logo = document.getElementById('navLogo');
      logo.href = CONTENT.nav.logo.href;
      logo.querySelector('img').src = CONTENT.nav.logo.src;
      logo.querySelector('img').alt = CONTENT.nav.logo.alt;
    })();

    // ── Build Mobile Menu ──────────────────────────
    (function buildMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const allItems = [...CONTENT.nav.left, ...CONTENT.nav.right];
      menu.innerHTML = allItems.map(item => {
        let html = `<a href="${item.href}">${item.label}</a>`;
        if (item.submenu) {
          html += item.submenu.map(s => `<a href="${s.href}" class="pl-12 text-sm text-gray-400">${s.label}</a>`).join('');
        }
        return html;
      }).join('');
    })();

    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }

    // ── Photo Gallery Grid Injections ──────────────
    // 8 images in the exact order: image1.jpg -> image8.jpg
    const GALLERY_IMAGES = [
      "images/gallery/image1.jpg",
      "images/gallery/image2.jpg",
      "images/gallery/image3.jpg",
      "images/gallery/image4.jpg",
      "images/gallery/image5.jpg",
      "images/gallery/image6.jpg",
      "images/gallery/image7.jpg",
      "images/gallery/image8.jpg"
    ];

    (function buildGalleryGrid() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = GALLERY_IMAGES.map((src, index) => `
        <div class="gallery-item group cursor-pointer animate-on-scroll" onclick="openLightbox(${index})">
          <img src="${src}" alt="Chess tournament tournament photo ${index + 1}" loading="lazy" />
          <div class="gallery-overlay">
            <span class="text-white text-xs font-semibold tracking-wider bg-black/60 px-3 py-1.5 rounded-full"><i class="fas fa-expand mr-2"></i>Expand</span>
          </div>
        </div>
      `).join('');
    })();

    // ── Lightbox preview modal logic ───────────────
    let currentImageIndex = 0;

    function openLightbox(index) {
      currentImageIndex = index;
      const modal = document.getElementById('lightboxModal');
      const img = document.getElementById('lightboxImage');
      const counter = document.getElementById('lightboxCounter');

      img.src = GALLERY_IMAGES[currentImageIndex];
      counter.textContent = `${currentImageIndex + 1} / ${GALLERY_IMAGES.length}`;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden'; // Lock background scroll
    }

    function closeLightbox() {
      const modal = document.getElementById('lightboxModal');
      modal.classList.remove('active');
      document.body.style.overflow = ''; // Unlock background scroll
    }

    function nextImage() {
      currentImageIndex = (currentImageIndex + 1) % GALLERY_IMAGES.length;
      openLightbox(currentImageIndex);
    }

    function prevImage() {
      currentImageIndex = (currentImageIndex - 1 + GALLERY_IMAGES.length) % GALLERY_IMAGES.length;
      openLightbox(currentImageIndex);
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      const modal = document.getElementById('lightboxModal');
      if (!modal.classList.contains('active')) return;

      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'ArrowLeft') prevImage();
    });

    // ── Build Footer ───────────────────────────────
    (function buildFooter() {
      document.getElementById('footerCol1').innerHTML = `
        <div class="flex flex-col items-center lg:items-start">
          <img src="${CONTENT.footer.logo.src}" alt="${CONTENT.footer.logo.alt}" class="w-56 mb-6" />
          <p class="text-gray-400 text-sm leading-relaxed text-center lg:text-left">${CONTENT.footer.description}</p>
        </div>
      `;

      const ql = CONTENT.footer.quickLinks;
      document.getElementById('footerCol2').innerHTML = `
        <div>
          <h3 class="text-xl font-bold mb-2">${ql.heading}</h3>
          <div class="footer-dotted-line"></div>
          <div class="grid grid-cols-2 gap-x-8 gap-y-4">
            <div class="space-y-4">
              ${ql.left.map(l => `<a href="${l.href}" class="block text-gray-400 text-sm hover:text-white transition-colors">${l.label}</a>`).join('')}
            </div>
            <div class="space-y-4">
              ${ql.right.map(l => `<a href="${l.href}" class="block text-gray-400 text-sm hover:text-white transition-colors">${l.label}</a>`).join('')}
            </div>
          </div>
        </div>
      `;

      const c = CONTENT.footer.contacts;
      const sm = CONTENT.footer.socialMedia;
      document.getElementById('footerCol3').innerHTML = `
        <div>
          <h3 class="text-xl font-bold mb-2">${c.heading}</h3>
          <div class="footer-dotted-line"></div>
          <div class="space-y-4 text-sm text-gray-400">
            <div class="flex gap-3">
              <i class="fas fa-map-marker-alt text-white mt-1"></i>
              <span>${c.address.replace(/\n/g, '<br/>')}</span>
            </div>
            <div class="flex gap-3 items-center">
              <i class="fas fa-mobile-alt text-white"></i>
              <a href="tel:${c.phone.replace(/\s/g, '')}" class="hover:text-white transition-colors">${c.phone}</a>
            </div>
            <div class="flex gap-3 items-center">
              <i class="fas fa-envelope text-white"></i>
              <a href="mailto:${c.email}" class="hover:text-white transition-colors">${c.email}</a>
            </div>
          </div>
          <h4 class="text-lg font-bold mt-8 mb-2">${sm.heading}</h4>
          <div class="footer-dotted-line"></div>
          <div class="flex gap-4 text-white text-lg">
            <a href="${sm.facebook}" target="_blank" rel="noopener noreferrer" class="hover:text-gray-400 transition-colors" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="${sm.twitter}" target="_blank" rel="noopener noreferrer" class="hover:text-gray-400 transition-colors" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="${sm.instagram}" target="_blank" rel="noopener noreferrer" class="hover:text-gray-400 transition-colors" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
          </div>
        </div>
      `;
      document.getElementById('copyrightBar').textContent = CONTENT.copyright;
    })();

    // ── Setup WhatsApp ─────────────────────────────
    (function setupWhatsApp() {
      const btn = document.getElementById('whatsappBtn');
      btn.href = `https://wa.me/${CONTENT.whatsapp.number}?text=${encodeURIComponent(CONTENT.whatsapp.message)}`;
    })();

    // ── Scroll to Top Button ────────────────────────
    (function setupScrollTop() {
      const btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
      });
    })();

    // ── Header Scroll Effect ────────────────────────
        (function setupHeaderScroll() {
      const header = document.getElementById('mainHeader');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
          header.classList.add('scrolled');
        } else {
          header.classList.remove('scrolled');
        }
      });
    })();

    // ── Scroll Animations (Intersection Observer) ──────────
    (function setupScrollAnimations() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.05 });

      document.querySelectorAll('.animate-on-scroll').forEach(el => {
        observer.observe(el);
      });
    })();
  </script>

</body>
</html>
