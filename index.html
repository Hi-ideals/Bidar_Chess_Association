<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Bidar Chess Association - Bidar Chess Association</title>
  <meta name="description" content="Chess is not just a game, but a healthy state-of-mind acquired through rigorous training and discipline. Bidar Chess Association has been at the fore-front to revolutionize the way chess is taught, to help both boys and girls win at their games as well as their lives." />
  <meta property="og:title" content="Bidar Chess Association - Bidar Chess Association" />
  <meta property="og:description" content="Chess is not just a game, but a healthy state-of-mind acquired through rigorous training and discipline. Bidar Chess Association has been at the fore-front to revolutionize the way chess is taught, to help both boys and girls win at their games as well as their lives." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />

  <!-- Google Fonts: Sora -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sora: ['Sora', 'sans-serif'],
          },
          colors: {
            dark: '#212326',
            light: '#E2D8DA',
            accent: '#af7d51',
            bodyBg: '#E9EAEF',
            gray1: '#434549',
            footerBg: '#1a1c1f',
          },
        },
      },
    };
  </script>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="font-sora">

  <!-- =====================================================
       HEADER — Top Social Bar
       ===================================================== -->
  <header class="nav-header" id="mainHeader">
    <!-- Top Social Bar -->
    <div class="top-social-bar py-3 px-6 lg:px-8" id="topBar">
      <div class="max-w-[104%] mx-auto flex items-center justify-between">
        <!-- Social Icons (Left) -->
        <div class="flex items-center gap-4" id="headerSocial"></div>
        <!-- Hamburger (Right, visible on mobile too) -->
        <div class="hamburger lg:flex" id="hamburgerBtn" onclick="toggleMobileMenu()">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Main Navigation -->
    <nav class="py-5 px-6 lg:px-8" id="mainNav">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <!-- Left Menu (desktop) -->
        <ul class="hidden lg:flex items-center gap-8 desktop-nav" id="navLeft"></ul>

        <!-- Logo (center) -->
        <a href="index.html" class="flex-shrink-0 mx-8" id="navLogo">
          <img src="images/logo.png" alt="Bidar Chess Association" class="w-[120px] h-[120px] object-contain" />
        </a>

        <!-- Right Menu (desktop) -->
        <ul class="hidden lg:flex items-center gap-8 desktop-nav" id="navRight"></ul>

        <!-- Mobile hamburger (inline for tablets) -->
        <button class="lg:hidden text-white text-2xl" onclick="toggleMobileMenu()" aria-label="Toggle Menu">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </nav>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu"></div>

  <!-- =====================================================
       HERO SECTION — Full-screen Slider
       ===================================================== -->
  <section class="hero-slider" id="heroSection">
    <div id="heroSlides"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content flex flex-col items-center justify-center min-h-screen text-center px-6">
      <div class="mt-20 animate-fadeInUp">
        <h2 class="text-white font-semibold text-lg md:text-xl mb-4 tracking-wide" id="heroWelcome"></h2>
        <h1 class="text-white font-bold text-4xl md:text-6xl lg:text-8xl mb-6 leading-tight" id="heroHeading" style="font-style:italic;"></h1>
        <p class="text-white text-base md:text-lg max-w-3xl mx-auto mb-10 leading-relaxed" id="heroDesc"></p>
        <div id="heroCta"></div>
      </div>
    </div>
  </section>

  <!-- =====================================================
       TICKER / MARQUEE
       ===================================================== -->
  <div class="ticker-wrap" id="tickerSection">
    <div class="ticker" id="tickerText"></div>
  </div>

  <!-- =====================================================
       ABOUT SECTION
       ===================================================== -->
  <section class="max-w-7xl mx-auto my-12 md:my-16 animate-on-scroll" id="aboutSection">
    <div class="flex flex-col lg:flex-row min-h-[500px]">
      <!-- Left Panel -->
      <div class="about-panel lg:w-3/5 p-12 md:p-20 lg:p-24 flex flex-col justify-center">
        <p class="font-bold text-sm mb-2" id="aboutLabel"></p>
        <h3 class="text-4xl md:text-5xl font-bold mb-6" id="aboutHeading" style="font-family:'Sora',sans-serif;"></h3>
        <div id="aboutContent" class="space-y-4 text-base leading-relaxed mb-8"></div>
        <div id="aboutCta"></div>
      </div>
      <!-- Right Panel (Image) -->
      <div class="lg:w-2/5 relative min-h-[400px] lg:min-h-0" id="aboutImage">
        <div class="absolute inset-0 flex flex-col justify-end items-end p-6">
          <a href="about.html" class="btn-outline btn-outline-white text-sm">
            View More <span class="ml-2">→</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- =====================================================
       OUR TESTIMONIALS
       ===================================================== -->
  <section class="py-10 md:py-16" id="testimonialsSection">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-center text-2xl md:text-3xl font-bold" id="testimonialsHeading"></h2>
    </div>
  </section>

  <!-- =====================================================
       SEPARATOR
       ===================================================== -->
  <div class="section-sep max-w-7xl mx-auto"></div>

  <!-- =====================================================
       MEET OUR TEAM
       ===================================================== -->
  <section class="py-16 md:py-20 animate-on-scroll" id="teamSection">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-center text-4xl md:text-5xl font-bold mb-4" id="teamHeading"></h2>
      <p class="text-center text-base text-gray-600 mb-12" id="teamSubtitle"></p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="teamGrid"></div>
      <div class="mt-10" id="teamCta"></div>
    </div>
  </section>

  <!-- =====================================================
       SEPARATOR
       ===================================================== -->
  <div class="section-sep max-w-7xl mx-auto mb-16"></div>

  <!-- =====================================================
       NEWS & BLOGS
       ===================================================== -->
  <section class="py-12 md:py-16 animate-on-scroll" id="newsSection">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-center text-4xl md:text-5xl font-bold mb-12" id="newsHeading"></h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="newsGrid"></div>
    </div>
  </section>

  <!-- =====================================================
       BENEFITS OF CHESS
       ===================================================== -->
  <section class="py-16 md:py-24 animate-on-scroll" id="benefitsSection">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex flex-col lg:flex-row gap-12 items-start">
        <!-- Left Content -->
        <div class="lg:w-1/2">
          <h2 class="text-3xl md:text-4xl font-bold mb-8" id="benefitsHeading"></h2>
          <div id="benefitsList" class="mb-8"></div>
          <div id="benefitsCta"></div>
        </div>
        <!-- Right Image -->
        <div class="lg:w-1/2" id="benefitsImage"></div>
      </div>
    </div>
  </section>

  <!-- =====================================================
       EVENTS SECTION
       ===================================================== -->
  <section class="events-section py-16 md:py-24" id="eventsSection">
    <div class="events-bg" id="eventsBg"></div>
    <div class="relative z-10 max-w-7xl mx-auto px-6">
      <div class="flex flex-col lg:flex-row gap-12">
        <!-- Left -->
        <div class="lg:w-2/5">
          <h2 class="text-white text-4xl md:text-5xl font-bold mb-6" id="eventsHeading"></h2>
          <p class="text-gray-300 text-base mb-8" id="eventsDesc"></p>
          <div id="eventsCta"></div>
        </div>
        <!-- Right (Event List) -->
        <div class="lg:w-3/5" id="eventsList"></div>
      </div>
    </div>
  </section>

  <!-- =====================================================
       COURSES SECTION
       ===================================================== -->
  <section class="py-16 md:py-24 animate-on-scroll" id="coursesSection">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex flex-col lg:flex-row gap-12 items-center">
        <!-- Left Image -->
        <div class="lg:w-1/2" id="coursesImage"></div>
        <!-- Right Content -->
        <div class="lg:w-1/2">
          <h2 class="text-3xl md:text-4xl font-bold mb-4" id="coursesHeading"></h2>
          <p class="text-base mb-4" id="coursesSubtitle"></p>
          <div id="coursesList" class="mb-8 space-y-4"></div>
          <div id="coursesCta"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- =====================================================
       DISCOVER THE CHESS
       ===================================================== -->
  <section class="discover-section flex items-center justify-center" id="discoverSection">
    <div class="discover-bg" id="discoverBg"></div>
    <div class="discover-overlay"></div>
    <div class="relative z-10 text-center py-24 md:py-36 px-6">
      <h2 class="text-white text-4xl md:text-6xl font-bold mb-6" id="discoverHeading"></h2>
      <p class="text-gray-200 text-base md:text-lg max-w-3xl mx-auto mb-10" id="discoverDesc"></p>
      <div id="discoverCta"></div>
    </div>
  </section>

  <!-- =====================================================
       FOOTER
       ===================================================== -->
  <footer class="bg-dark text-white pt-16 pb-8" id="siteFooter">
    <div class="max-w-7xl mx-auto px-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-12">
        <!-- Col 1: Logo & Description -->
        <div id="footerCol1"></div>
        <!-- Col 2: Quick Links -->
        <div id="footerCol2"></div>
        <!-- Col 3: Contacts -->
        <div id="footerCol3"></div>
      </div>
      <!-- Copyright Bar -->
      <div class="border-t border-gray-700 pt-6 text-center text-sm text-gray-400" id="copyrightBar"></div>
    </div>
  </footer>

  <!-- =====================================================
       FLOATING ELEMENTS
       ===================================================== -->
  <!-- WhatsApp Button -->
  <a class="whatsapp-btn" id="whatsappBtn" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16.004 0h-.008C7.174 0 0 7.176 0 16.004c0 3.502 1.14 6.742 3.072 9.376L1.062 31.13l5.97-1.972A15.93 15.93 0 0016.004 32C24.826 32 32 24.824 32 16.004 32 7.176 24.826 0 16.004 0zm9.32 22.616c-.392 1.098-1.936 2.01-3.156 2.276-.836.178-1.928.32-5.606-1.204-4.704-1.95-7.73-6.726-7.966-7.038-.226-.312-1.9-2.534-1.9-4.832 0-2.298 1.2-3.43 1.628-3.898.392-.428 1.018-.606 1.614-.606.196 0 .372.01.53.018.468.02.702.048 1.012.784.388.922 1.332 3.252 1.448 3.49.118.24.236.556.078.868-.148.32-.278.52-.518.798-.24.278-.494.62-.706.832-.24.24-.49.502-.21.984.278.482 1.238 2.042 2.66 3.31 1.826 1.63 3.364 2.136 3.842 2.374.478.238.758.198 1.036-.118.278-.318 1.198-1.396 1.516-1.874.318-.478.636-.398 1.074-.238.44.158 2.784 1.314 3.262 1.552.478.24.796.356.914.556.116.198.116 1.156-.276 2.266z"/></svg>
  </a>

  <!-- Scroll to Top Button -->
  <button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
    <i class="fas fa-chevron-up"></i>
  </button>

  <!-- =====================================================
       JAVASCRIPT — Content Injection & Interactions
       ===================================================== -->
  <script src="content.js"></script>
  <script>
    // ── Utility: Create Arrow Span ─────────────────────────
    const arrow = () => '<span class="ml-2 inline-block transition-transform group-hover:translate-x-1">→</span>';

    // ── Populate Header Social Icons ───────────────────────
    (function buildHeaderSocial() {
      const el = document.getElementById('headerSocial');
      const icons = [
        { icon: 'fa-brands fa-facebook-f', href: CONTENT.social.facebook, label: 'Facebook' },
        { icon: 'fa-brands fa-x-twitter', href: CONTENT.social.twitter, label: 'X' },
        { icon: 'fa-brands fa-instagram', href: CONTENT.social.instagram, label: 'Instagram' },
      ];
      el.innerHTML = icons.map(i =>
        `<a href="${i.href}" target="_blank" rel="noopener noreferrer" class="text-white text-sm hover:text-gray-300 transition-colors" aria-label="${i.label}"><i class="${i.icon}"></i></a>`
      ).join('');
    })();

    // ── Populate Navigation ────────────────────────────────
    (function buildNav() {
      const left = document.getElementById('navLeft');
      const right = document.getElementById('navRight');

      left.innerHTML = CONTENT.nav.left.map(item => {
        if (item.submenu) {
          return `<li class="nav-item relative">
            <a href="${item.href}" class="nav-link ${item.active ? 'active' : ''}">${item.label} <i class="fas fa-chevron-down text-[10px] ml-1"></i></a>
            <div class="nav-dropdown">
              ${item.submenu.map(s => `<a href="${s.href}">${s.label}</a>`).join('')}
            </div>
          </li>`;
        }
        return `<li class="nav-item"><a href="${item.href}" class="nav-link ${item.active ? 'active' : ''}">${item.label}</a></li>`;
      }).join('');

      right.innerHTML = CONTENT.nav.right.map(item =>
        `<li class="nav-item"><a href="${item.href}" class="nav-link">${item.label}</a></li>`
      ).join('');

      // Logo
      const logo = document.getElementById('navLogo');
      logo.href = CONTENT.nav.logo.href;
      logo.querySelector('img').src = CONTENT.nav.logo.src;
      logo.querySelector('img').alt = CONTENT.nav.logo.alt;
    })();

    // ── Build Mobile Menu ──────────────────────────────────
    (function buildMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const allItems = [...CONTENT.nav.left, ...CONTENT.nav.right];
      menu.innerHTML = allItems.map(item => {
        let html = `<a href="${item.href}">${item.label}</a>`;
        if (item.submenu) {
          html += item.submenu.map(s => `<a href="${s.href}" class="pl-12 text-sm text-gray-400">${s.label}</a>`).join('');
        }
        return html;
      }).join('');
    })();

    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }

    // ── Build Hero Slides ──────────────────────────────────
    (function buildHero() {
      const container = document.getElementById('heroSlides');
      container.innerHTML = CONTENT.hero.slides.map((src, i) =>
        `<div class="hero-slide ${i === 0 ? 'active' : ''}"><img src="${src}" alt="Chess wallpaper" /></div>`
      ).join('');

      document.getElementById('heroWelcome').textContent = CONTENT.hero.welcomeText;
      document.getElementById('heroHeading').textContent = CONTENT.hero.heading;
      document.getElementById('heroDesc').textContent = CONTENT.hero.description;
      document.getElementById('heroCta').innerHTML =
        `<a href="${CONTENT.hero.cta.href}" class="btn-hero group">${CONTENT.hero.cta.text} ${arrow()}</a>`;

      // Auto-advance slider
      let current = 0;
      const slides = container.querySelectorAll('.hero-slide');
      setInterval(() => {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
      }, 5000);
    })();

    // ── Build Ticker ───────────────────────────────────────
    (function buildTicker() {
      document.getElementById('tickerText').textContent = CONTENT.ticker.text;
    })();

    // ── Build About Section ────────────────────────────────
    (function buildAbout() {
      document.getElementById('aboutLabel').textContent = CONTENT.about.label;
      document.getElementById('aboutHeading').textContent = CONTENT.about.heading;

      const content = document.getElementById('aboutContent');
      content.innerHTML = `<p class="font-medium">${CONTENT.about.tagline}</p>` +
        CONTENT.about.paragraphs.map(p => `<p>${p}</p>`).join('');

      document.getElementById('aboutCta').innerHTML =
        `<a href="${CONTENT.about.cta.href}" class="btn-outline group">${CONTENT.about.cta.text} ${arrow()}</a>`;

      // Right image panel
      const imgPanel = document.getElementById('aboutImage');
      imgPanel.style.backgroundImage = `url('${CONTENT.about.image}')`;
      imgPanel.style.backgroundSize = 'cover';
      imgPanel.style.backgroundPosition = 'center';
    })();

    // ── Build Testimonials ─────────────────────────────────
    (function buildTestimonials() {
      document.getElementById('testimonialsHeading').innerHTML = `<strong>${CONTENT.testimonials.heading}</strong>`;
    })();

    // ── Build Team Section ─────────────────────────────────
    (function buildTeam() {
      document.getElementById('teamHeading').textContent = CONTENT.team.heading;
      document.getElementById('teamSubtitle').textContent = CONTENT.team.subtitle;

      const grid = document.getElementById('teamGrid');
      grid.innerHTML = CONTENT.team.members.map(m => `
        <div class="team-card">
          <div class="team-card-role">${m.role}</div>
          <div class="team-card-image">
            <img src="${m.image}" alt="${m.name}" />
          </div>
          <div class="text-center pb-6">
            <span class="team-card-name">${m.name}</span>
          </div>
        </div>
      `).join('');

      document.getElementById('teamCta').innerHTML =
        `<a href="${CONTENT.team.cta.href}" class="btn-outline group">${CONTENT.team.cta.text} ${arrow()}</a>`;
    })();

    // ── Build News & Blogs ─────────────────────────────────
    (function buildNews() {
      document.getElementById('newsHeading').textContent = CONTENT.news.heading;

      const grid = document.getElementById('newsGrid');
      grid.innerHTML = CONTENT.news.posts.map(post => `
        <a href="${post.href}" class="news-card block">
          <img src="${post.image}" alt="${post.title}" />
          <div class="news-card-overlay"></div>
          <span class="news-card-date">${post.date}</span>
          <div class="news-card-title">${post.title}</div>
          <span class="news-card-arrow">→</span>
        </a>
      `).join('');
    })();

    // ── Build Benefits Section ─────────────────────────────
    (function buildBenefits() {
      document.getElementById('benefitsHeading').textContent = CONTENT.benefits.heading;

      const list = document.getElementById('benefitsList');
      list.innerHTML = CONTENT.benefits.items.map(item =>
        `<div class="benefit-item">${item}</div>`
      ).join('');

      document.getElementById('benefitsCta').innerHTML =
        `<a href="${CONTENT.benefits.cta.href}" class="btn-outline group">${CONTENT.benefits.cta.text} ${arrow()}</a>`;

      const imgEl = document.getElementById('benefitsImage');
      imgEl.innerHTML = `<img src="${CONTENT.benefits.image}" alt="${CONTENT.benefits.imageAlt}" class="w-full h-auto rounded-lg shadow-lg" />`;
    })();

    // ── Build Events Section ───────────────────────────────
    (function buildEvents() {
      // Background: reuse a chess image
      document.getElementById('eventsBg').innerHTML =
        `<img src="images/hero/slide3.jpg" alt="Events background" />`;

      document.getElementById('eventsHeading').textContent = CONTENT.events.heading;
      document.getElementById('eventsDesc').textContent = CONTENT.events.description;
      document.getElementById('eventsCta').innerHTML =
        `<a href="${CONTENT.events.cta.href}" class="btn-outline btn-outline-white group">${CONTENT.events.cta.text} ${arrow()}</a>`;

      const list = document.getElementById('eventsList');
      list.innerHTML = CONTENT.events.items.map(ev => `
        <div class="event-card flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
          <div class="flex-1">
            <p class="text-gray-300 text-sm mb-1">${ev.title}</p>
          </div>
          <div class="flex-1">
            <h4 class="text-white text-2xl font-bold">${ev.date}</h4>
            <p class="text-gray-400 text-sm mt-1">${ev.time}</p>
          </div>
          <div>
            <a href="${ev.href}" class="btn-outline btn-outline-white text-sm group">${ev.ctaText} ${arrow()}</a>
          </div>
        </div>
      `).join('');
    })();

    // ── Build Courses Section ──────────────────────────────
    (function buildCourses() {
      document.getElementById('coursesImage').innerHTML =
        `<img src="${CONTENT.courses.image}" alt="${CONTENT.courses.imageAlt}" class="w-full h-auto rounded-lg shadow-lg" />`;

      document.getElementById('coursesHeading').textContent = CONTENT.courses.heading;
      document.getElementById('coursesSubtitle').textContent = CONTENT.courses.subtitle;

      const list = document.getElementById('coursesList');
      list.innerHTML = CONTENT.courses.items.map(item =>
        `<p class="text-base">${item}</p>`
      ).join('');

      document.getElementById('coursesCta').innerHTML =
        `<a href="${CONTENT.courses.cta.href}" class="btn-outline group">${CONTENT.courses.cta.text} ${arrow()}</a>`;
    })();

    // ── Build Discover Section ─────────────────────────────
    (function buildDiscover() {
      document.getElementById('discoverBg').innerHTML =
        `<img src="${CONTENT.discover.bgImage}" alt="Discover chess background" />`;

      document.getElementById('discoverHeading').textContent = CONTENT.discover.heading;
      document.getElementById('discoverDesc').textContent = CONTENT.discover.description;
      document.getElementById('discoverCta').innerHTML =
        `<a href="${CONTENT.discover.cta.href}" class="btn-hero group">${CONTENT.discover.cta.text} ${arrow()}</a>`;
    })();

    // ── Build Footer ───────────────────────────────────────
    (function buildFooter() {
      // Col 1: Logo + Description
      document.getElementById('footerCol1').innerHTML = `
        <div class="flex flex-col items-center lg:items-start">
          <img src="${CONTENT.footer.logo.src}" alt="${CONTENT.footer.logo.alt}" class="w-56 mb-6" />
          <p class="text-gray-400 text-sm leading-relaxed text-center lg:text-left">${CONTENT.footer.description}</p>
        </div>
      `;

      // Col 2: Quick Links
      const ql = CONTENT.footer.quickLinks;
      document.getElementById('footerCol2').innerHTML = `
        <div>
          <h3 class="text-xl font-bold mb-2">${ql.heading}</h3>
          <div class="footer-dotted-line"></div>
          <div class="grid grid-cols-2 gap-x-8 gap-y-4">
            <div class="space-y-4">
              ${ql.left.map(l => `<a href="${l.href}" class="block text-gray-400 text-sm hover:text-white transition-colors">${l.label}</a>`).join('')}
            </div>
            <div class="space-y-4">
              ${ql.right.map(l => `<a href="${l.href}" class="block text-gray-400 text-sm hover:text-white transition-colors">${l.label}</a>`).join('')}
            </div>
          </div>
        </div>
      `;

      // Col 3: Contacts
      const c = CONTENT.footer.contacts;
      const sm = CONTENT.footer.socialMedia;
      document.getElementById('footerCol3').innerHTML = `
        <div>
          <h3 class="text-xl font-bold mb-2">${c.heading}</h3>
          <div class="footer-dotted-line"></div>
          <div class="space-y-4 text-sm text-gray-400">
            <div class="flex gap-3">
              <i class="fas fa-map-marker-alt text-white mt-1"></i>
              <span>${c.address.replace(/\n/g, '<br/>')}</span>
            </div>
            <div class="flex gap-3 items-center">
              <i class="fas fa-mobile-alt text-white"></i>
              <a href="tel:${c.phone.replace(/\s/g, '')}" class="hover:text-white transition-colors">${c.phone}</a>
            </div>
            <div class="flex gap-3 items-center">
              <i class="fas fa-envelope text-white"></i>
              <a href="mailto:${c.email}" class="hover:text-white transition-colors">${c.email}</a>
            </div>
          </div>
          <h4 class="text-lg font-bold mt-8 mb-2">${sm.heading}</h4>
          <div class="footer-dotted-line"></div>
          <div class="flex gap-4 text-white text-lg">
            <a href="${sm.facebook}" target="_blank" rel="noopener noreferrer" class="hover:text-gray-400 transition-colors" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="${sm.twitter}" target="_blank" rel="noopener noreferrer" class="hover:text-gray-400 transition-colors" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="${sm.instagram}" target="_blank" rel="noopener noreferrer" class="hover:text-gray-400 transition-colors" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
          </div>
        </div>
      `;

      // Copyright
      document.getElementById('copyrightBar').textContent = CONTENT.copyright;
    })();

    // ── WhatsApp Button ────────────────────────────────────
    (function setupWhatsApp() {
      const btn = document.getElementById('whatsappBtn');
      btn.href = `https://wa.me/${CONTENT.whatsapp.number}?text=${encodeURIComponent(CONTENT.whatsapp.message)}`;
    })();

    // ── Scroll to Top Button ───────────────────────────────
    (function setupScrollTop() {
      const btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
      });
    })();

    // ── Header Scroll Effect ───────────────────────────────
    (function setupHeaderScroll() {
      const header = document.getElementById('mainHeader');
      const topBar = document.getElementById('topBar');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
          header.classList.add('scrolled');
          topBar.style.display = 'none';
        } else {
          header.classList.remove('scrolled');
          topBar.style.display = '';
        }
      });
    })();

    // ── Scroll Animations (Intersection Observer) ──────────
    (function setupScrollAnimations() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.animate-on-scroll').forEach(el => {
        observer.observe(el);
      });
    })();
  </script>

</body>
</html>
